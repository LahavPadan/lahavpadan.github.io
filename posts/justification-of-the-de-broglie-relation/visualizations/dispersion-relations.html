<!doctype html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<script>
(() => {
  try {
    const root = window.parent.document.documentElement;
    const body = window.parent.document.body;
    const raw = `${root.dataset.theme || ""} ${root.className || ""} ${body?.dataset?.theme || ""} ${body?.className || ""}`.toLowerCase();
    document.documentElement.dataset.theme = raw.includes("dark") ? "dark" : raw.includes("light") ? "light" : "";
  } catch (_) {}
})();
</script>
<style>
:root {
  color-scheme: light;
  --surface: var(--viz-surface, #ffffff);
  --surface-muted: var(--viz-surface-muted, #f5f6f2);
  --ink: var(--viz-ink, #1b2420);
  --muted: var(--viz-muted, #68736c);
  --border: var(--viz-border, #d6ddd7);
  --border-strong: var(--viz-border-strong, #a7b3aa);
  --accent: var(--viz-accent, #0d7659);
  --accent-ink: var(--viz-accent-ink, #095f48);
  --accent-soft: var(--viz-accent-soft, #dcefe7);
  --accent-border: var(--viz-accent-border, #91c7b6);
  --phase: #315fae;
  --group: #9b631b;
  --initial: #8b9690;
  --shadow: rgba(20, 31, 25, .06);
  --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --serif: "Lora", Georgia, "Times New Roman", serif;
  --math-font: "Lora", "Cambria Math", Georgia, serif;
}
:root[data-theme="dark"] {
  color-scheme: dark;
  --surface: var(--viz-surface, #171e19);
  --surface-muted: var(--viz-surface-muted, #1d2720);
  --ink: var(--viz-ink, #e9efeb);
  --muted: var(--viz-muted, #a7b5aa);
  --border: var(--viz-border, #344138);
  --border-strong: var(--viz-border-strong, #617168);
  --accent: var(--viz-accent, #63d2aa);
  --accent-ink: var(--viz-accent-ink, #8ee7c6);
  --accent-soft: var(--viz-accent-soft, #16362c);
  --accent-border: var(--viz-accent-border, #3c7964);
  --phase: #8bb2ff;
  --group: #e0a666;
  --initial: #7d8b82;
  --shadow: rgba(0, 0, 0, .18);
}
* { box-sizing: border-box; }
html, body { margin: 0; min-width: 0; overflow-x: hidden; background: transparent; color: var(--ink); }
body { padding: clamp(7px, 1.8vw, 18px); font-family: var(--sans); text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
button, input { font: inherit; }
.viz { width: min(1120px, 100%); margin: 0 auto; overflow: hidden; border: 1px solid var(--border); background: var(--surface); box-shadow: 0 18px 48px var(--shadow); }
.topbar { display: grid; grid-template-columns: minmax(0, 1fr) minmax(330px, .44fr); gap: 20px; align-items: start; padding: clamp(15px, 2.4vw, 23px); border-bottom: 1px solid var(--border); }
.control-stack { display: grid; gap: 10px; }
.heading-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 9px 17px; }
.eyebrow { margin: 0; color: var(--accent-ink); font: 760 .68rem/1 var(--sans); letter-spacing: .10em; text-transform: uppercase; }
h1 { margin: 0; font-size: clamp(1.22rem, 2.5vw, 1.82rem); font-weight: 560; line-height: 1.14; letter-spacing: -.025em; }
.definition { margin: 7px 0 0; color: var(--muted); font-family: var(--serif); font-size: clamp(.9rem, 1.45vw, 1.01rem); line-height: 1.42; }
.definition mjx-container { margin: 0 !important; }
.k-control, .time-control-box { min-width: 0; padding: 9px 11px 10px; border: 1px solid var(--border); background: var(--surface-muted); }
.k-label { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: var(--muted); font-size: .7rem; }
.k-label strong { color: var(--accent-ink); font-family: var(--math-font); font-weight: 700; }
.k-control input, .time-track { width: 100%; margin: 8px 0 0; accent-color: var(--accent); }
.time-row { display: grid; grid-template-columns: 34px minmax(0,1fr) 48px; gap: 8px; align-items: center; margin-top: 8px; }
.play { width: 34px; height: 31px; border: 1px solid var(--border-strong); background: var(--surface); color: var(--accent-ink); cursor: pointer; font-size: .82rem; }
.time-value { color: var(--accent-ink); font-family: var(--math-font); font-size: .78rem; text-align: right; white-space: nowrap; }
.medium-tabs { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); border-bottom: 1px solid var(--border); background: var(--surface-muted); }
.medium-tabs button { min-width: 0; min-height: 43px; padding: 7px 9px; border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: clamp(.66rem, 1.05vw, .77rem); font-weight: 760; line-height: 1.2; }
.medium-tabs button + button { border-left: 1px solid var(--border); }
.medium-tabs button[aria-pressed="true"] { background: var(--accent-soft); color: var(--accent-ink); }
.medium-tabs button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
.figure { margin: 0; padding: clamp(10px, 2vw, 20px); }
.canvas { display: grid; grid-template-columns: minmax(0, 1.6fr) minmax(285px, .72fr); border: 1px solid var(--border); background: var(--surface-muted); }
.panel { min-width: 0; }
.panel + .panel { border-left: 1px solid var(--border); background: color-mix(in srgb, var(--surface) 52%, var(--surface-muted)); }
.panel-head { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline; gap: 5px 12px; min-height: 43px; padding: 10px 12px 9px; border-bottom: 1px solid var(--border); background: color-mix(in srgb, var(--surface) 80%, transparent); }
.panel-title { color: var(--muted); font-size: .66rem; font-weight: 790; letter-spacing: .08em; text-transform: uppercase; }
.panel-formula { color: var(--ink); font-family: var(--math-font); font-size: clamp(.72rem, 1.2vw, .9rem); white-space: nowrap; }
.panel-formula mjx-container { margin: 0 !important; }
#curvePlot, #packetPlot { display: block; width: 100%; height: auto; overflow: visible; }
.plot-bg { fill: var(--surface-muted); }
.grid-line { stroke: var(--border); stroke-width: 1; }
.axis-line { stroke: var(--border-strong); stroke-width: 1.25; }
.axis-text, .tick-text { fill: var(--muted); }
.tick-text { font-family: var(--sans); font-size: 11px; }
.axis-text { font-family: var(--math-font); font-size: 15px; font-style: italic; font-weight: 430; letter-spacing: 0; }
.curve { fill: none; stroke: var(--accent); stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
.phase-ray { stroke: var(--phase); stroke-width: 2.35; }
.group-tangent { stroke: var(--group); stroke-width: 2.35; }
.point { fill: var(--surface); stroke: var(--accent); stroke-width: 2.4; }
.guide { stroke: var(--border-strong); stroke-width: 1.15; stroke-dasharray: 5 5; }
.svg-label { font-family: var(--sans); font-size: 12px; font-weight: 720; paint-order: stroke; stroke: var(--surface-muted); stroke-width: 4px; stroke-linejoin: round; }
.svg-label.phase { fill: var(--phase); }
.svg-label.group { fill: var(--group); }
.svg-label.accent { fill: var(--accent-ink); }
.svg-label.muted { fill: var(--muted); font-weight: 620; }
.packet-axis { stroke: var(--border-strong); stroke-width: 1.1; }
.packet-envelope.initial { fill: none; stroke: var(--initial); stroke-width: 1.7; stroke-dasharray: 6 5; }
.packet-envelope.later { fill: none; stroke: var(--group); stroke-width: 2.25; }
.packet-wave.initial { fill: none; stroke: var(--initial); stroke-width: 1.15; opacity: .72; }
.packet-wave.later { fill: none; stroke: var(--phase); stroke-width: 1.8; }
.packet-arrow { stroke: var(--accent-ink); stroke-width: 1.5; }

.wave-envelope.initial { fill: none; stroke: var(--initial); stroke-width: 1.7; stroke-dasharray: 6 5; }
.wave-envelope.current { fill: none; stroke: var(--group); stroke-width: 2.15; }
.wave-signal.initial { fill: none; stroke: var(--initial); stroke-width: 1.1; opacity: .62; }
.wave-signal.current { fill: none; stroke: var(--phase); stroke-width: 1.9; }
.wave-track.phase { stroke: var(--phase); stroke-width: 1.7; stroke-dasharray: 5 5; }
.wave-track.group { stroke: var(--group); stroke-width: 1.7; stroke-dasharray: 5 5; }
.wave-dot.phase { fill: var(--surface); stroke: var(--phase); stroke-width: 2.1; }
.wave-dot.group { fill: var(--surface); stroke: var(--group); stroke-width: 2.1; }
.wave-shift { stroke: var(--accent-ink); stroke-width: 1.5; }

.readout-strip { display: grid; grid-template-columns: 1.25fr .72fr .72fr .95fr; border: 1px solid var(--border); border-top: 0; background: var(--surface); }
.readout { min-width: 0; padding: 10px 11px; }
.readout + .readout { border-left: 1px solid var(--border); }
.readout-name { display: block; margin-bottom: 3px; color: var(--muted); font-size: .61rem; font-weight: 790; letter-spacing: .075em; text-transform: uppercase; }
.readout-value { display: block; color: var(--ink); font-family: var(--math-font); font-size: clamp(.78rem, 1.12vw, .95rem); line-height: 1.3; }
.readout.phase .readout-name, .readout.phase .readout-value { color: var(--phase); }
.readout.group .readout-name, .readout.group .readout-value { color: var(--group); }
.readout-note { display: block; margin-top: 2px; color: var(--muted); font-family: var(--sans); font-size: .65rem; line-height: 1.25; }
.readout mjx-container { margin: 0 !important; }
.explanation { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 7px 12px; padding: 9px 12px; border: 1px solid var(--border); border-top: 0; color: var(--muted); font-size: clamp(.69rem, 1.1vw, .8rem); text-align: center; }
.explanation strong { color: var(--accent-ink); font-weight: 770; }
.explanation mjx-container { margin: 0 !important; }
@media (max-width: 820px) {
  .topbar { grid-template-columns: 1fr; }
  .canvas { grid-template-columns: 1fr; }
  .panel + .panel { border-left: 0; border-top: 1px solid var(--border); }
  .readout-strip { grid-template-columns: 1fr 1fr; }
  .readout:nth-child(3) { border-left: 0; border-top: 1px solid var(--border); }
  .readout:nth-child(4) { border-top: 1px solid var(--border); }
}
@media (max-width: 540px) {
  body { padding: 5px; }
  .topbar { padding: 13px; }
  .medium-tabs { grid-template-columns: 1fr 1fr; }
  .medium-tabs button:nth-child(3) { border-left: 0; border-top: 1px solid var(--border); }
  .medium-tabs button:nth-child(4) { border-top: 1px solid var(--border); }
  .figure { padding: 7px; }
  .readout-strip { grid-template-columns: 1fr; }
  .readout + .readout, .readout:nth-child(3), .readout:nth-child(4) { border-left: 0; border-top: 1px solid var(--border); }
}
</style>
</head>
<body>
<main class="viz">
  <header class="topbar">
    <div>
      <div class="heading-row">
        <p class="eyebrow">dispersion relation</p>
        <h1>The medium chooses the curve \(\omega=\omega(k)\)</h1>
      </div>
      <p class="definition">
        The ray from the origin measures \(\omega_0/k_0\); the tangent measures \(d\omega/dk\). A linear dispersion relation makes those two slopes identical everywhere.
      </p>
    </div>
    <div class="control-stack">
      <label class="k-control" for="kChoice">
        <span class="k-label"><span>choose the carrier wavenumber</span><strong id="kValue">\(k_0=6.0\)</strong></span>
        <input id="kChoice" type="range" min="1.2" max="9.0" step="0.05" value="6.0" aria-label="Carrier wavenumber">
      </label>
      <div class="time-control-box">
        <span class="k-label"><span>time</span><strong id="timeReadoutTop">t = 4.0</strong></span>
        <div class="time-row">
          <button class="play" id="play" type="button" aria-label="Play animation">▶</button>
          <input id="timeChoice" class="time-track" type="range" min="0" max="10" step="0.01" value="4.0" aria-label="Time">
          <output id="timeValue" class="time-value">4.0</output>
        </div>
      </div>
    </div>
  </header>

  <nav class="medium-tabs" aria-label="Classical dispersion relations">
    <button type="button" data-kind="vacuum" aria-pressed="false">light in vacuum</button>
    <button type="button" data-kind="string" aria-pressed="false">stretched string</button>
    <button type="button" data-kind="water" aria-pressed="true">deep-water waves</button>
    <button type="button" data-kind="material" aria-pressed="false">material optics</button>
  </nav>

  <figure class="figure">
    <div class="canvas">
      <section class="panel" aria-label="Dispersion curve">
        <div class="panel-head">
          <span class="panel-title">frequency versus wavenumber</span>
          <span id="curveFormula" class="panel-formula">\(\omega(k)=\sqrt{gk}\)</span>
        </div>
        <svg id="curvePlot" viewBox="0 0 760 440" role="img" aria-labelledby="curveTitle curveDesc" preserveAspectRatio="xMidYMid meet">
          <title id="curveTitle">Dispersion curve with phase and group velocity slopes</title>
          <desc id="curveDesc">The phase velocity is the slope from the origin to the selected point. The group velocity is the tangent slope at that point.</desc>
          <defs><clipPath id="curveClip"><rect x="54" y="35" width="654" height="340"></rect></clipPath></defs>
          <rect class="plot-bg" x="54" y="35" width="654" height="340"></rect>
          <g id="curveGrid"></g>
          <g clip-path="url(#curveClip)">
            <path id="curve" class="curve"></path>
            <line id="phaseRay" class="phase-ray"></line>
            <line id="groupTangent" class="group-tangent"></line>
            <line id="verticalGuide" class="guide"></line>
            <line id="horizontalGuide" class="guide"></line>
            <circle id="selectedPoint" class="point" r="6"></circle>
          </g>
          <g id="curveTicks"></g>
          <text class="axis-text" x="697" y="412" text-anchor="end">wavenumber k</text>
          <text class="axis-text" x="66" y="55">frequency ω</text>
          <text id="phaseLabel" class="svg-label phase"></text>
          <text id="groupLabel" class="svg-label group"></text>
          <text id="pointLabel" class="svg-label accent"></text>
          <text id="curveLabel" class="svg-label accent"></text>
          <text id="materialNote" class="svg-label muted"></text>
        </svg>
      </section>

      <section class="panel" aria-label="Real-space wave packet">
        <div class="panel-head">
          <span class="panel-title">real space</span>
          <span id="packetHeading" class="panel-formula">real-space packet \(A(z-v_g t)\cos(k_0z-\omega_0 t)\)</span>
        </div>
        <svg id="packetPlot" viewBox="0 0 360 440" role="img" aria-labelledby="packetTitle packetDesc" preserveAspectRatio="xMidYMid meet">
          <title id="packetTitle">Wave packet in real space</title>
          <desc id="packetDesc">The envelope center moves at the group velocity while carrier crests move at the phase velocity. In dispersive media the envelope also broadens.</desc>
          <defs>
            <clipPath id="packetClip"><rect x="27" y="42" width="306" height="330"></rect></clipPath>
            <marker id="packetArrow" viewBox="0 0 10 10" refX="8.7" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10Z" fill="var(--accent-ink)"></path></marker>
          </defs>
          <rect class="plot-bg" x="27" y="42" width="306" height="330"></rect>
          <g clip-path="url(#packetClip)">
            <line class="packet-axis" x1="42" y1="206" x2="318" y2="206"></line>
            <path id="initialEnvelopeTop" class="wave-envelope initial"></path>
            <path id="initialEnvelopeBottom" class="wave-envelope initial"></path>
            <path id="initialWave" class="wave-signal initial"></path>
            <path id="laterEnvelopeTop" class="wave-envelope current"></path>
            <path id="laterEnvelopeBottom" class="wave-envelope current"></path>
            <path id="laterWave" class="wave-signal current"></path>
            <line id="groupTrack" class="wave-track group"></line>
            <line id="phaseTrack" class="wave-track phase"></line>
            <circle id="groupDot" class="wave-dot group" r="5"></circle>
            <circle id="phaseDot" class="wave-dot phase" r="5"></circle>
            <line id="packetMotion" class="wave-shift" marker-end="url(#packetArrow)"></line>
          </g>
          <text class="axis-text" x="320" y="395" text-anchor="end">position \(z\)</text>
          <text class="axis-text" x="42" y="58">amplitude</text>
          <text class="svg-label muted" x="44" y="74">dashed grey: packet at \(t=0\)</text>
          <text class="svg-label phase" x="44" y="96">blue: carrier at the chosen time \(t\)</text>
          <text class="svg-label group" x="44" y="118">brown: envelope at the same time \(t\)</text>
          <text id="packetResult" class="svg-label group"></text>
          <text id="packetMotionLabel" class="svg-label accent" text-anchor="middle"></text>
          <text id="phaseMarkerLabel" class="svg-label phase"></text>
          <text id="groupMarkerLabel" class="svg-label group"></text>
        </svg>
      </section>
    </div>

    <div class="readout-strip">
      <div class="readout">
        <span class="readout-name">dispersion relation</span>
        <span id="relationReadout" class="readout-value">\(\omega=\sqrt{gk}\)</span>
        <span id="relationNote" class="readout-note">nonlinear curve</span>
      </div>
      <div class="readout phase">
        <span class="readout-name">phase velocity</span>
        <span id="phaseReadout" class="readout-value">\(v_p=\omega_0/k_0\)</span>
        <span class="readout-note">ray slope</span>
      </div>
      <div class="readout group">
        <span class="readout-name">group velocity</span>
        <span id="groupReadout" class="readout-value">\(v_g=d\omega/dk\)</span>
        <span class="readout-note">tangent slope</span>
      </div>
      <div class="readout">
        <span class="readout-name">packet</span>
        <span id="packetReadout" class="readout-value">spreads</span>
        <span id="packetReadoutNote" class="readout-note">different components separate</span>
      </div>
    </div>
    <div id="explanation" class="explanation"></div>
  </figure>
</main>

<script>
(() => {
  "use strict";

  const NS = "http://www.w3.org/2000/svg";
  const state = { kind: "water", k0: 6, time: 4, playing: false };
  const kInput = document.getElementById("kChoice");
  const timeInput = document.getElementById("timeChoice");
  const timeValue = document.getElementById("timeValue");
  const playButton = document.getElementById("play");
  const plot = { box: { x0: 54, x1: 708, y0: 35, y1: 375 }, kMin: 0, kMax: 10, wMin: 0, wMax: 5.5 };
  const packet = { box: { x0: 42, x1: 318 }, xMin: -8, xMax: 8 };
  const sk = k => plot.box.x0 + (k - plot.kMin) / (plot.kMax - plot.kMin) * (plot.box.x1 - plot.box.x0);
  const sw = omega => plot.box.y1 - (omega - plot.wMin) / (plot.wMax - plot.wMin) * (plot.box.y1 - plot.box.y0);
  const px = x => packet.box.x0 + (x - packet.xMin) / (packet.xMax - packet.xMin) * (packet.box.x1 - packet.box.x0);
  const clamp = (value, minimum, maximum) => Math.max(minimum, Math.min(maximum, value));

  const configs = {
    vacuum: {
      formula: "\\(\\omega(k)=c\\lvert k\\rvert\\)",
      relation: "\\(\\omega=c\\lvert k\\rvert\\)",
      note: "linear curve",
      explanation: "The curve is a straight line, so its tangent slope equals its slope from the origin at every carrier wavenumber.",
      omega: k => .50 * k,
      derivative: () => .50,
      packet: "preserves its shape",
      packetNote: "all spectral components translate together",
      heading: "\\(v_g=v_p=c\\)",
      spread: 1
    },
    string: {
      formula: "\\(\\omega(k)=c_s\\lvert k\\rvert\\)",
      relation: "\\(c_s=\\sqrt{T/\\mu}\\)",
      note: "linear curve",
      explanation: "Changing the tension or mass density changes the line's slope, but not its linearity; the packet remains nondispersive.",
      omega: k => .64 * k,
      derivative: () => .64,
      packet: "preserves its shape",
      packetNote: "the envelope width is unchanged",
      heading: "\\(v_g=v_p=c_s\\)",
      spread: 1
    },
    water: {
      formula: "\\(\\omega(k)=\\sqrt{g\\lvert k\\rvert}\\)",
      relation: "\\(\\omega=\\sqrt{g\\lvert k\\rvert}\\)",
      note: "nonlinear curve",
      explanation: "For deep-water gravity waves the tangent is half as steep as the ray from the origin: the envelope advances at half the phase velocity.",
      omega: k => 1.62 * Math.sqrt(Math.max(k, 0)),
      derivative: k => 1.62 / (2 * Math.sqrt(k)),
      packet: "spreads",
      packetNote: "nearby components acquire different velocities",
      heading: "\\(v_g=v_p/2\\)",
      spread: 1.55
    },
    material: {
      formula: "\\(k(\\omega)=n(\\omega)\\,\\omega/c\\)",
      relation: "\\(\\omega=ck/n(\\omega)\\)",
      note: "frequency-dependent index",
      explanation: "A frequency-dependent refractive index bends the relation. Different colors therefore sample different slopes and propagate differently.",
      omega: k => invertMaterial(k),
      derivative: k => {
        const omega = invertMaterial(k);
        return 1 / (1.30 + .06 * omega * omega);
      },
      packet: "generally spreads",
      packetNote: "the local slope varies across the spectrum",
      heading: "\\(v_g\\neq v_p\\;\\text{in general}\\)",
      spread: 1.35
    }
  };

  function materialK(omega) {
    const n = 1.30 + .02 * omega * omega;
    return n * omega;
  }

  function invertMaterial(k) {
    let low = 0;
    let high = 6;
    for (let i = 0; i < 48; i += 1) {
      const mid = (low + high) / 2;
      if (materialK(mid) < k) low = mid;
      else high = mid;
    }
    return (low + high) / 2;
  }

  function current() { return configs[state.kind]; }

  function createSvg(name, attributes = {}) {
    const element = document.createElementNS(NS, name);
    Object.entries(attributes).forEach(([key, value]) => element.setAttribute(key, value));
    return element;
  }

  function pathFromSamples(count, xValue, yValue, xMap, yMap) {
    let d = "";
    for (let i = 0; i <= count; i += 1) {
      const u = i / count;
      d += `${i ? "L" : "M"}${xMap(xValue(u)).toFixed(2)} ${yMap(yValue(u)).toFixed(2)}`;
    }
    return d;
  }

  function renderGrid() {
    const grid = document.getElementById("curveGrid");
    const ticks = document.getElementById("curveTicks");
    grid.replaceChildren();
    ticks.replaceChildren();
    [0, 2, 4, 6, 8, 10].forEach(k => {
      grid.appendChild(createSvg("line", {
        class: k === 0 ? "axis-line" : "grid-line",
        x1: sk(k), y1: plot.box.y0, x2: sk(k), y2: plot.box.y1
      }));
      if (k !== 0) {
        const label = createSvg("text", { class: "tick-text", x: sk(k), y: plot.box.y1 + 18, "text-anchor": "middle" });
        label.textContent = k;
        ticks.appendChild(label);
      }
    });
    [0, 1, 2, 3, 4, 5].forEach(omega => {
      grid.appendChild(createSvg("line", {
        class: omega === 0 ? "axis-line" : "grid-line",
        x1: plot.box.x0, y1: sw(omega), x2: plot.box.x1, y2: sw(omega)
      }));
      if (omega !== 0) {
        const label = createSvg("text", { class: "tick-text", x: plot.box.x0 - 9, y: sw(omega) + 4, "text-anchor": "end" });
        label.textContent = omega;
        ticks.appendChild(label);
      }
    });
  }

  function setLine(id, x1, y1, x2, y2) {
    const element = document.getElementById(id);
    element.setAttribute("x1", x1);
    element.setAttribute("y1", y1);
    element.setAttribute("x2", x2);
    element.setAttribute("y2", y2);
  }

  function setCircle(id, x, y) {
    const element = document.getElementById(id);
    element.setAttribute("cx", x);
    element.setAttribute("cy", y);
  }

  function renderCurve() {
    const cfg = current();
    const omega0 = cfg.omega(state.k0);
    const vp = omega0 / state.k0;
    const vg = cfg.derivative(state.k0);
    const curve = pathFromSamples(420, u => .02 + u * 9.98, u => cfg.omega(.02 + u * 9.98), sk, sw);
    document.getElementById("curve").setAttribute("d", curve);

    setLine("phaseRay", sk(0), sw(0), sk(state.k0), sw(omega0));
    const tangentSpan = 2.0;
    setLine(
      "groupTangent",
      sk(state.k0 - tangentSpan),
      sw(omega0 - vg * tangentSpan),
      sk(state.k0 + tangentSpan),
      sw(omega0 + vg * tangentSpan)
    );
    setLine("verticalGuide", sk(state.k0), sw(0), sk(state.k0), sw(omega0));
    setLine("horizontalGuide", sk(0), sw(omega0), sk(state.k0), sw(omega0));
    setCircle("selectedPoint", sk(state.k0), sw(omega0));

    const phaseLabel = document.getElementById("phaseLabel");
    phaseLabel.textContent = "ray from (0,0): slope = vₚ";
    phaseLabel.setAttribute("x", clamp(sk(state.k0 * .42), 84, 520));
    phaseLabel.setAttribute("y", clamp(sw(omega0 * .42) + 21, 115, 330));

    const groupLabel = document.getElementById("groupLabel");
    groupLabel.textContent = "tangent at (k₀,ω₀): slope = v_g";
    groupLabel.setAttribute("x", clamp(sk(state.k0 + .72), 215, 520));
    groupLabel.setAttribute("y", clamp(sw(omega0 + vg * .72) - 14, 72, 340));

    const pointLabel = document.getElementById("pointLabel");
    pointLabel.textContent = "selected point  (k₀, ω₀)";
    pointLabel.setAttribute("x", clamp(sk(state.k0) + 10, 70, 630));
    pointLabel.setAttribute("y", clamp(sw(omega0) - 11, 52, 352));

    const curveLabel = document.getElementById("curveLabel");
    const labelK = state.kind === "water" ? 2.25 : state.kind === "material" ? 3.2 : 2.8;
    curveLabel.textContent = state.kind === "vacuum" ? "ω = c|k|" : state.kind === "string" ? "ω = cₛ|k|" : state.kind === "water" ? "ω = √(g|k|)" : "ω = ck/n(ω)";
    curveLabel.setAttribute("x", sk(labelK) + 8);
    curveLabel.setAttribute("y", sw(cfg.omega(labelK)) - 11);

    const materialNote = document.getElementById("materialNote");
    materialNote.textContent = state.kind === "material" ? "illustrative normal dispersion: n(ω) increases with ω" : "";
    materialNote.setAttribute("x", 77);
    materialNote.setAttribute("y", 351);
  }

  function packetPath(center, width, amplitude, baseline, phase, envelopeOnly, upper) {
    const count = 360;
    let d = "";
    for (let i = 0; i <= count; i += 1) {
      const u = i / count;
      const x = packet.xMin + u * (packet.xMax - packet.xMin);
      const env = amplitude * Math.exp(-((x - center) ** 2) / (2 * width * width));
      const y = envelopeOnly ? (upper ? baseline - env : baseline + env) : baseline - env * Math.cos(5.4 * (x - center) + phase);
      d += `${i ? "L" : "M"}${px(x).toFixed(2)} ${y.toFixed(2)}`;
    }
    return d;
  }

  function renderPacket() {
    const cfg = current();
    const omega0 = cfg.omega(state.k0);
    const vp = omega0 / state.k0;
    const vg = cfg.derivative(state.k0);
    const t = state.time;
    const center0 = -2.8;
    const center = center0 + 0.55 * vg * t;
    const crest = center0 + 0.55 * vp * t;
    const width0 = 1.45;
    const broaden = cfg.spread === 1 ? 1 : 1 + (cfg.spread - 1) * (t / 10);
    const width = width0 * broaden;
    const amp0 = 43;
    const amp = amp0 / Math.sqrt(broaden);
    const baseline = 206;

    document.getElementById("initialEnvelopeTop").setAttribute("d", packetPath(center0, width0, amp0, baseline, 0, true, true));
    document.getElementById("initialEnvelopeBottom").setAttribute("d", packetPath(center0, width0, amp0, baseline, 0, true, false));
    document.getElementById("initialWave").setAttribute("d", packetPath(center0, width0, amp0, baseline, 0, false, true));
    document.getElementById("laterEnvelopeTop").setAttribute("d", packetPath(center, width, amp, baseline, 0, true, true));
    document.getElementById("laterEnvelopeBottom").setAttribute("d", packetPath(center, width, amp, baseline, 0, true, false));
    document.getElementById("laterWave").setAttribute("d", packetPath(center, width, amp, baseline, 5.2 * (vp - vg) * (t / 4), false, true));

    setLine("packetMotion", px(center0), 354, px(center), 354);
    setLine("groupTrack", px(center), 42, px(center), 372);
    setLine("phaseTrack", px(crest), 42, px(crest), 372);
    setCircle("groupDot", px(center), baseline);
    setCircle("phaseDot", px(crest), baseline);

    const motion = document.getElementById("packetMotionLabel");
    motion.textContent = "envelope displacement  =  v_g t";
    motion.setAttribute("x", clamp((px(center0) + px(center)) / 2, 76, 286));
    motion.setAttribute("y", 344);

    const phaseMarkerLabel = document.getElementById("phaseMarkerLabel");
    phaseMarkerLabel.textContent = "crest position  z = vₚ t";
    phaseMarkerLabel.setAttribute("x", clamp(px(crest) + 8, 58, 238));
    phaseMarkerLabel.setAttribute("y", 150);

    const groupMarkerLabel = document.getElementById("groupMarkerLabel");
    groupMarkerLabel.textContent = "envelope center  z = v_g t";
    groupMarkerLabel.setAttribute("x", clamp(px(center) + 8, 58, 220));
    groupMarkerLabel.setAttribute("y", 128);

    const result = document.getElementById("packetResult");
    result.textContent = cfg.spread === 1 ? "width unchanged" : `width at time t: broader by a factor ${broaden.toFixed(2)}`;
    result.setAttribute("x", 44);
    result.setAttribute("y", 373);
    result.setAttribute("text-anchor", "start");
  }

  function updateText() {
    const cfg = current();
    const omega0 = cfg.omega(state.k0);
    const vp = omega0 / state.k0;
    const vg = cfg.derivative(state.k0);
    document.getElementById("kValue").innerHTML = `\\(k_0=${state.k0.toFixed(2)}\\)`;
    document.getElementById("curveFormula").innerHTML = cfg.formula;
    timeValue.textContent = state.time.toFixed(1);
    document.getElementById("timeReadoutTop").textContent = `t = ${state.time.toFixed(1)}`;
    document.getElementById("packetHeading").textContent = cfg.heading;
    document.getElementById("relationReadout").innerHTML = cfg.relation;
    document.getElementById("relationNote").textContent = cfg.note;
    document.getElementById("phaseReadout").innerHTML = `\\(v_p=${vp.toFixed(2)}\\)`;
    document.getElementById("groupReadout").innerHTML = `\\(v_g=${vg.toFixed(2)}\\)`;
    document.getElementById("packetReadout").textContent = cfg.packet;
    document.getElementById("packetReadoutNote").textContent = cfg.spread === 1 ? "the width stays fixed" : "the width increases because nearby spectral components drift apart";
    document.getElementById("explanation").innerHTML = `<strong>${state.kind === "vacuum" ? "Vacuum" : state.kind === "string" ? "Stretched string" : state.kind === "water" ? "Deep water" : "Material"}:</strong> ${cfg.explanation}`;
    typeset([
      document.getElementById("kValue"),
      document.getElementById("curveFormula"),
      document.getElementById("relationReadout"),
      document.getElementById("phaseReadout"),
      document.getElementById("groupReadout"),
      document.getElementById("explanation")
    ]);
  }

  function render() {
    renderCurve();
    renderPacket();
    updateText();
    reportHeight();
  }

  function typeset(elements) {
    if (!window.MathJax?.typesetPromise) return;
    window.MathJax.typesetClear?.(elements);
    window.MathJax.typesetPromise(elements).then(reportHeight).catch(() => {});
  }

  document.querySelectorAll("[data-kind]").forEach(button => {
    button.addEventListener("click", () => {
      state.kind = button.dataset.kind;
      document.querySelectorAll("[data-kind]").forEach(item => item.setAttribute("aria-pressed", String(item === button)));
      render();
    });
  });

  kInput.addEventListener("input", () => {
    state.k0 = Number(kInput.value);
    render();
  });

  timeInput.addEventListener("input", () => {
    state.time = Number(timeInput.value);
    render();
  });

  playButton.addEventListener("click", () => {
    state.playing = !state.playing;
    playButton.textContent = state.playing ? "❚❚" : "▶";
    playButton.setAttribute("aria-label", state.playing ? "Pause animation" : "Play animation");
  });

  let previous = performance.now();
  function animate(now) {
    const dt = Math.min(.05, (now - previous) / 1000);
    previous = now;
    if (state.playing) {
      state.time += 1.1 * dt;
      if (state.time > Number(timeInput.max)) state.time = 0;
      timeInput.value = state.time;
      render();
    }
    requestAnimationFrame(animate);
  }

  let lastReportedHeight = 0;
  function reportHeight() {
    if (window.parent === window) return;
    const target = document.querySelector(".viz") || document.body;
    const rect = target.getBoundingClientRect();
    const height = Math.max(1, Math.ceil(rect.bottom + window.scrollY));
    if (Math.abs(height - lastReportedHeight) < 2) return;
    lastReportedHeight = height;
    try {
      const targetOrigin = window.location.origin === "null" ? "*" : window.location.origin;
      window.parent.postMessage({ type: "article-visualization-height", height }, targetOrigin);
    } catch (_) {}
  }


  renderGrid();
  render();
  requestAnimationFrame(animate);

  if ("ResizeObserver" in window) {
    const observer = new ResizeObserver(reportHeight);
    observer.observe(document.querySelector(".viz") || document.body);
  }
  window.addEventListener("load", reportHeight);
  window.addEventListener("resize", reportHeight);
})();
</script>
</body>
</html>
