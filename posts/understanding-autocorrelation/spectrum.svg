<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Periodic binary signal and autocorrelation</title>
  <desc id="desc">A line drawing with a repeating square-wave signal above and autocorrelation peaks below.</desc>
  <rect width="960" height="360" fill="#f8fbf8"/>
  <g stroke="#c9d4cc" stroke-width="2">
    <path d="M70 75H910M70 170H910M70 275H910"/>
    <path d="M70 40V315M910 40V315"/>
  </g>
  <g fill="none" stroke="#0a6f52" stroke-width="5" stroke-linejoin="round">
    <path d="M70 140H120V80H190V140H240V80H310V140H360V80H430V140H480V80H550V140H600V80H670V140H720V80H790V140H840V80H910"/>
  </g>
  <g fill="none" stroke="#222d27" stroke-width="4" stroke-linejoin="round">
    <path d="M70 275H140L180 260L220 220L260 260L300 275L340 260L380 220L420 260L460 275L500 260L540 220L580 260L620 275L660 260L700 220L740 260L780 275L820 260L860 220L910 275"/>
  </g>
  <g fill="#0a6f52"><circle cx="220" cy="220" r="7"/><circle cx="380" cy="220" r="7"/><circle cx="540" cy="220" r="7"/><circle cx="700" cy="220" r="7"/><circle cx="860" cy="220" r="7"/></g>
  <g fill="#52645a" font-family="ui-monospace, monospace" font-size="19"><text x="70" y="30">signal x[n]</text><text x="70" y="205">autocorrelation r[k]</text><text x="202" y="335">P</text><text x="362" y="335">2P</text><text x="522" y="335">3P</text><text x="682" y="335">4P</text><text x="842" y="335">5P</text></g>
</svg>
