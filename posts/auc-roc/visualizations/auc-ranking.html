<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>AUC as ranking probability</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400..800&family=Lora:ital,wght@0,400..700;1,400..700&display=swap">

  <style>
    :root {
      --page: var(--viz-page, #f7f5f1);
      --panel: var(--viz-surface, #fffdfa);
      --panel-2: var(--viz-surface-muted, #f2eef4);
      --ink: var(--viz-ink, #20232b);
      --muted: var(--viz-muted, #68717e);
      --line: var(--viz-border, #d9d2dc);
      --line-strong: var(--viz-border-strong, #a89daa);
      --accent: var(--viz-accent, #6d3fa0);
      --accent-ink: var(--viz-accent-ink, #5b3188);
      --accent-soft: var(--viz-accent-soft, #f0e7f8);
      --shadow: 0 18px 44px rgba(42, 30, 50, .08);
      --serif: "Lora", Georgia, "Times New Roman", serif;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --math: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      color-scheme: light;
    }

    :root[data-theme="dark"] {
      --page: var(--viz-page, #0d1411);
      --panel: var(--viz-surface, #111b17);
      --panel-2: var(--viz-surface-muted, #17231e);
      --ink: var(--viz-ink, #f4f0e7);
      --muted: var(--viz-muted, #b6c0b8);
      --line: var(--viz-border, #314139);
      --line-strong: var(--viz-border-strong, #66766e);
      --accent: var(--viz-accent, #d7a8f5);
      --accent-ink: var(--viz-accent-ink, #e3c3fa);
      --accent-soft: var(--viz-accent-soft, #34233e);
      --shadow: 0 18px 48px rgba(0, 0, 0, .28);
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-width: 0; background: transparent; color: var(--ink); }
    body { padding: 1px; font-family: var(--sans); -webkit-font-smoothing: antialiased; }
    button, input { font: inherit; }

    .ranking-viz {
      width: 100%;
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .ranking-viz::before {
      content: "";
      display: block;
      height: 3px;
      background: var(--accent);
    }

    .viz-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      align-items: end;
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow,
    .panel-kicker,
    .metric-label,
    .control-readout {
      font-family: var(--mono);
      font-weight: 750;
      letter-spacing: .075em;
      text-transform: uppercase;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--accent-ink);
      font-size: .66rem;
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(1.22rem, 3vw, 1.68rem);
      font-weight: 600;
      letter-spacing: -.025em;
      line-height: 1.12;
    }

    .lede {
      max-width: 680px;
      margin: 5px 0 0;
      color: var(--muted);
      font-family: var(--serif);
      font-size: .9rem;
      line-height: 1.43;
    }

    .reset-button {
      appearance: none;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: .68rem;
      font-weight: 700;
    }

    .reset-button:hover,
    .reset-button:focus-visible {
      border-color: var(--accent);
      color: var(--accent-ink);
      outline: none;
    }

    .control-strip {
      display: grid;
      grid-template-columns: auto minmax(180px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-2) 70%, var(--panel));
    }

    .control-readout {
      color: var(--accent-ink);
      font-size: .65rem;
      white-space: nowrap;
    }

    .control-strip .control-readout:first-child { min-width: 10.5rem; }
    .control-strip .control-readout:last-child { min-width: 13.5rem; text-align: right; }

    .control-value {
      color: var(--ink);
      font-family: var(--math);
      font-size: .9rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      text-transform: none;
    }

    #processedValue {
      display: inline-block;
      min-width: 7.75ch;
      text-align: right;
    }

    .sweep {
      width: 100%;
      min-width: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .sweep:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }

    .mobile-tabs {
      display: none;
      padding: 10px 10px 0;
      gap: 6px;
    }

    .mobile-tab {
      appearance: none;
      flex: 1 1 0;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: .65rem;
      font-weight: 750;
      letter-spacing: .045em;
      text-transform: uppercase;
    }

    .mobile-tab.is-active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-ink);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(0, .88fr);
      gap: 12px;
      padding: 12px;
    }

    .panel {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--line);
    }

    .panel-kicker {
      color: var(--accent-ink);
      font-size: .62rem;
    }

    .panel-title {
      margin: 2px 0 0;
      font-family: var(--serif);
      font-size: .98rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .panel-state {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .62rem;
      text-align: right;
    }

    .plot-wrap {
      min-width: 0;
      padding: 6px 8px 8px;
      background:
        linear-gradient(var(--line) 1px, transparent 1px) 0 0 / 100% 38px,
        color-mix(in srgb, var(--panel-2) 54%, var(--panel));
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
      touch-action: manipulation;
    }

    #rankPlot { aspect-ratio: 600 / 245; }
    #rocPlot { aspect-ratio: 480 / 245; }

    svg text { fill: var(--ink); font-family: var(--sans); }
    .svg-muted { fill: var(--muted); }
    .svg-accent { fill: var(--accent-ink); }
    .axis { stroke: var(--line-strong); stroke-width: 1.4; }
    .grid { stroke: var(--line); stroke-width: 1; }
    .guide { stroke: var(--accent); stroke-width: 1.6; stroke-dasharray: 5 5; }
    .roc-path { fill: none; stroke: var(--line-strong); stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
    .active-segment { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; }
    .area-strip { fill: color-mix(in srgb, var(--accent-soft) 84%, transparent); stroke: var(--accent); stroke-width: 1; }
    .sample { cursor: pointer; transition: opacity .18s ease, transform .18s ease; transform-box: fill-box; transform-origin: center; }
    .sample:hover, .sample:focus { transform: scale(1.08); }
    .sample:focus { outline: none; }
    .sample circle { stroke: var(--panel); stroke-width: 3; }
    .sample--p circle { fill: var(--accent); }
    .sample--n circle { fill: var(--muted); }
    .sample--future { opacity: .33; }
    .sample--current circle { stroke: var(--accent-ink); stroke-width: 4; }
    .sample-label { fill: var(--panel); font-family: var(--mono); font-size: 12px; font-weight: 800; pointer-events: none; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: 1px solid var(--line);
      background: var(--panel-2);
    }

    .metric {
      min-width: 0;
      padding: 11px 13px 12px;
    }

    .metric + .metric { border-left: 1px solid var(--line); }
    .metric-label { color: var(--muted); font-size: .59rem; }
    .metric-value {
      min-height: 4.2em;
      margin-top: 4px;
      color: var(--ink);
      font-family: var(--math);
      font-size: clamp(.82rem, 2vw, .98rem);
      line-height: 1.38;
    }
    .metric-value strong { color: var(--accent-ink); font-weight: 600; }
    #heightMetric { font-size: clamp(.74rem, 1.55vw, .9rem); }

    figcaption {
      margin: 0;
      padding: 11px 14px 13px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: var(--serif);
      font-size: .84rem;
      line-height: 1.45;
    }
    figcaption strong { color: var(--ink); }
    .math { font-family: var(--math); color: var(--accent-ink); }

    @media (max-width: 690px) {
      .viz-head { grid-template-columns: 1fr; gap: 8px; }
      .reset-button { justify-self: start; }
      .mobile-tabs { display: flex; }
      .workspace { grid-template-columns: 1fr; padding-top: 8px; }
      .workspace[data-mobile-panel="rank"] #rocPanel,
      .workspace[data-mobile-panel="roc"] #rankPanel { display: none; }
      #rankPlot { aspect-ratio: 600 / 225; }
      #rocPlot { width: min(100%, 520px); margin-inline: auto; aspect-ratio: 480 / 245; }
    }

    @media (max-width: 520px) {
      .ranking-viz { border-radius: 16px; }
      .viz-head { padding: 14px 14px 12px; }
      .lede { font-size: .84rem; }
      .control-strip {
        grid-template-columns: 1fr auto;
        gap: 8px 10px;
        padding: 11px 14px 12px;
      }
      .sweep { grid-column: 1 / -1; grid-row: 2; }
      .control-strip .control-readout:first-child,
      .control-strip .control-readout:last-child { min-width: 0; }
      .control-strip .control-readout:last-child { text-align: right; }
      .workspace { gap: 10px; padding: 10px; }
      .panel-head { align-items: flex-start; }
      .panel-state { max-width: 120px; }
      .metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .metric { padding: 8px 8px 9px; }
      .metric-label { font-size: .52rem; }
      .metric-value { font-size: .76rem; line-height: 1.3; }
      #heightMetric { font-size: .68rem; }
      figcaption { font-size: .8rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <figure class="ranking-viz" id="rankingFigure" aria-labelledby="rankingTitle rankingDescription">
    <header class="viz-head">
      <div>
        <p class="eyebrow">AUC as a ranking probability</p>
        <h1 id="rankingTitle">Count the positives above each negative</h1>
        <p class="lede" id="rankingDescription">Pick a negative <span class="math">x<sub>−</sub></span>. Every positive with a higher score contributes one concordant pair. The fraction <span class="math">T(x<sub>−</sub>) = #{x<sub>+</sub> : S(x<sub>+</sub>) &gt; S(x<sub>−</sub>)} / |P|</span> is exactly the height of the rectangle that <span class="math">x<sub>−</sub></span> contributes to the ROC area. Summing over all negatives gives <span class="math">AUC</span>.</p>
      </div>
    </header>

    <div class="control-strip">
      <div class="control-readout">selected <span class="control-value" id="selectedValue">x<sub>7</sub> · negative</span></div>
      <div class="control-readout" style="text-align:center; grid-column: 2;">click any negative on the left panel</div>
      <button type="button" class="reset-button" id="resetButton" aria-label="Cycle to the next negative">next negative →</button>
    </div>

    <div class="mobile-tabs" role="tablist" aria-label="Choose the coordinate view">
      <button type="button" class="mobile-tab is-active" id="rankTab" role="tab" aria-selected="true" aria-controls="rankPanel">score ordering</button>
      <button type="button" class="mobile-tab" id="rocTab" role="tab" aria-selected="false" aria-controls="rocPanel">ROC geometry</button>
    </div>

    <div class="workspace" id="workspace" data-mobile-panel="rank">
      <section class="panel" id="rankPanel" aria-labelledby="rankPanelTitle">
        <div class="panel-head">
          <div>
            <div class="panel-kicker">score ordering</div>
            <h2 class="panel-title" id="rankPanelTitle">Positives with a higher score than the selected negative</h2>
          </div>
          <div class="panel-state" id="rankState">click a negative</div>
        </div>
        <div class="plot-wrap">
          <svg id="rankPlot" viewBox="0 0 600 245" role="img" aria-label="Samples on a score axis; positives above the selected negative are highlighted"></svg>
        </div>
      </section>

      <section class="panel" id="rocPanel" aria-labelledby="rocPanelTitle">
        <div class="panel-head">
          <div>
            <div class="panel-kicker">ROC geometry</div>
            <h2 class="panel-title" id="rocPanelTitle">This negative's rectangle strip</h2>
          </div>
          <div class="panel-state" id="rocState">width 1/|N|, height T(x<sub>−</sub>)</div>
        </div>
        <div class="plot-wrap">
          <svg id="rocPlot" viewBox="0 0 480 245" role="img" aria-label="ROC staircase with the selected negative's rectangle highlighted"></svg>
        </div>
      </section>
    </div>

    <div class="metrics" aria-live="polite">
      <div class="metric">
        <div class="metric-label">selected negative</div>
        <div class="metric-value" id="stepMetric"><span class="math">x<sub>7</sub></span> with <span class="math">S(x<sub>−</sub>) = 0.78</span></div>
      </div>
      <div class="metric">
        <div class="metric-label">positives that outrank it</div>
        <div class="metric-value" id="heightMetric"><span class="math">T(x<sub>−</sub>) = 2 / 5</span></div>
      </div>
      <div class="metric">
        <div class="metric-label">this negative's contribution</div>
        <div class="metric-value" id="areaMetric"><span class="math">T(x<sub>−</sub>) / |N| = 2 / 20</span></div>
      </div>
    </div>

    <figcaption><strong>Every ordered pair, one negative at a time.</strong> The rectangle contributed by <span class="math">x<sub>−</sub></span> counts exactly the concordant pairs <span class="math">(x<sub>+</sub>, x<sub>−</sub>)</span> in which <span class="math">x<sub>+</sub></span> outranks this specific <span class="math">x<sub>−</sub></span>. Summing over the four negatives here gives <span class="math">(5 + 5 + 4 + 2) / (5 · 4) = 16 / 20 = 0.8</span> — the AUC.</figcaption>
  </figure>

  <script>
    (() => {
      'use strict';

      const samples = [
        { kind: 'N', score: 0.18, label: 'x\u2081' },
        { kind: 'N', score: 0.30, label: 'x\u2082' },
        { kind: 'P', score: 0.42, label: 'x\u2083' },
        { kind: 'N', score: 0.53, label: 'x\u2084' },
        { kind: 'P', score: 0.62, label: 'x\u2085' },
        { kind: 'P', score: 0.70, label: 'x\u2086' },
        { kind: 'N', score: 0.78, label: 'x\u2087' },
        { kind: 'P', score: 0.89, label: 'x\u2088' },
        { kind: 'P', score: 0.96, label: 'x\u2089' }
      ];

      const totalP = samples.filter(s => s.kind === 'P').length;
      const totalN = samples.length - totalP;
      const NS = 'http://www.w3.org/2000/svg';

      const negativeIndices = samples
        .map((s, i) => (s.kind === 'N' ? i : -1))
        .filter(i => i >= 0);

      // Order negatives by DECREASING score. The k-th such negative (0-indexed)
      // owns the ROC rectangle strip x in [k/|N|, (k+1)/|N|].
      const negativeOrder = negativeIndices
        .slice()
        .sort((a, b) => samples[b].score - samples[a].score);
      const negativeRank = new Map();
      negativeOrder.forEach((idx, rank) => negativeRank.set(idx, rank));

      // T(x_-) for each negative index.
      const heightAt = new Map();
      negativeIndices.forEach(idx => {
        const s = samples[idx].score;
        const above = samples.filter(x => x.kind === 'P' && x.score > s).length;
        heightAt.set(idx, above / totalP);
      });

      // The ROC staircase, sorted by decreasing score.
      const rocPoints = [{ fpr: 0, tpr: 0 }];
      const rocOwners = []; // owner sample index for the segment ending at rocPoints[i+1]
      const scoreSorted = samples
        .map((s, i) => ({ ...s, idx: i }))
        .sort((a, b) => b.score - a.score);
      let tp = 0;
      let fp = 0;
      scoreSorted.forEach(sample => {
        if (sample.kind === 'P') tp += 1;
        else fp += 1;
        rocPoints.push({ fpr: fp / totalN, tpr: tp / totalP });
        rocOwners.push(sample.idx);
      });

      const figure = document.getElementById('rankingFigure');
      const rankPlot = document.getElementById('rankPlot');
      const rocPlot = document.getElementById('rocPlot');
      const workspace = document.getElementById('workspace');
      const rankTab = document.getElementById('rankTab');
      const rocTab = document.getElementById('rocTab');
      const selectedValue = document.getElementById('selectedValue');
      const rankState = document.getElementById('rankState');
      const rocState = document.getElementById('rocState');
      const stepMetric = document.getElementById('stepMetric');
      const heightMetric = document.getElementById('heightMetric');
      const areaMetric = document.getElementById('areaMetric');
      const resetButton = document.getElementById('resetButton');

      // Default selection: x_7 (the tightest example, T = 2/5).
      let selectedIndex = 6;

      function node(name, attrs = {}, text = '') {
        const el = document.createElementNS(NS, name);
        Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, String(v)));
        if (text) el.textContent = text;
        return el;
      }

      function clear(svg) { while (svg.firstChild) svg.removeChild(svg.firstChild); }

      // ---- Score-ordering panel ----

      function renderRank() {
        clear(rankPlot);

        // Coordinate system inside the viewBox 600x245.
        const left = 48, right = 552, axisY = 168;
        const sampleY = 108;

        // Draw axis.
        rankPlot.append(
          node('line', { x1: left, y1: axisY, x2: right, y2: axisY, class: 'axis' }),
          node('text', { x: left, y: axisY + 22, 'font-size': 11, class: 'svg-muted' }, 'lower score'),
          node('text', { x: right, y: axisY + 22, 'font-size': 11, 'text-anchor': 'end', class: 'svg-muted' }, 'higher score')
        );

        const selected = samples[selectedIndex];
        const selectedScore = selected.score;

        // Sample X-positions: proportional to their score (min score at left, max at right).
        const minScore = samples[0].score;
        const maxScore = samples[samples.length - 1].score;
        const xFor = score => left + ((score - minScore) / (maxScore - minScore)) * (right - left);

        // Bracket over the "positives above the selected negative".
        const abovePositives = samples
          .map((s, i) => ({ ...s, i }))
          .filter(s => s.kind === 'P' && s.score > selectedScore);

        if (abovePositives.length > 0) {
          const bx1 = xFor(abovePositives[0].score);
          const bx2 = xFor(abovePositives[abovePositives.length - 1].score);
          const by = sampleY - 44;
          rankPlot.append(
            node('path', {
              d: `M ${bx1} ${by + 8} L ${bx1} ${by} L ${bx2} ${by} L ${bx2} ${by + 8}`,
              fill: 'none',
              stroke: 'var(--accent)',
              'stroke-width': 1.6,
              'stroke-linecap': 'round'
            }),
            node('text', {
              x: (bx1 + bx2) / 2,
              y: by - 6,
              'font-size': 12,
              'text-anchor': 'middle',
              'font-weight': 700,
              class: 'svg-accent'
            }, `${abovePositives.length} positives above`)
          );
        }

        // Vertical guide line at the selected negative's score.
        const sx = xFor(selectedScore);
        rankPlot.append(
          node('line', {
            x1: sx, y1: sampleY - 22,
            x2: sx, y2: axisY,
            class: 'guide'
          }),
          node('text', {
            x: sx, y: axisY + 40,
            'font-size': 11, 'text-anchor': 'middle',
            class: 'svg-accent'
          }, `S(x\u208B) = ${selectedScore.toFixed(2)}`)
        );

        // Draw samples.
        samples.forEach((sample, i) => {
          const isSelected = i === selectedIndex;
          const isAbovePositive = sample.kind === 'P' && sample.score > selectedScore;
          const isBelowPositive = sample.kind === 'P' && sample.score <= selectedScore;
          const cx = xFor(sample.score);

          const group = node('g', {
            class: `sample sample--${sample.kind.toLowerCase()}${isBelowPositive ? ' sample--future' : ''}`,
            'data-index': i,
            tabindex: sample.kind === 'N' ? 0 : -1,
            role: sample.kind === 'N' ? 'button' : 'presentation',
            'aria-pressed': sample.kind === 'N' ? String(isSelected) : undefined,
            'aria-label': sample.kind === 'N' ? `Negative ${sample.label} with score ${sample.score.toFixed(2)}` : undefined
          });

          if (isSelected) group.setAttribute('class', group.getAttribute('class') + ' sample--current');

          const r = isSelected ? 16 : 14;
          group.append(node('circle', { cx, cy: sampleY, r }));
          group.append(node('text', {
            x: cx, y: sampleY + 4,
            'text-anchor': 'middle',
            class: 'sample-label'
          }, sample.kind));

          // Sample label below (x_i and score).
          group.append(node('text', {
            x: cx, y: sampleY + 44,
            'text-anchor': 'middle',
            'font-size': 11,
            class: 'svg-muted'
          }, sample.label));
          group.append(node('text', {
            x: cx, y: sampleY + 58,
            'text-anchor': 'middle',
            'font-size': 10,
            class: 'svg-muted'
          }, sample.score.toFixed(2)));

          if (isAbovePositive) {
            group.setAttribute('opacity', '1');
          }
          if (isBelowPositive) {
            group.setAttribute('opacity', '0.28');
          }

          if (sample.kind === 'N') {
            group.addEventListener('click', () => select(i));
            group.addEventListener('keydown', ev => {
              if (ev.key === 'Enter' || ev.key === ' ') {
                ev.preventDefault();
                select(i);
              }
            });
          }
          rankPlot.appendChild(group);
        });
      }

      // ---- ROC panel ----

      function renderRoc() {
        clear(rocPlot);

        const left = 56, right = 448, top = 20, bottom = 200;
        const width = right - left, height = bottom - top;
        const X = fpr => left + fpr * width;
        const Y = tpr => bottom - tpr * height;

        // Grid lines.
        [0, .25, .5, .75, 1].forEach(v => {
          rocPlot.append(
            node('line', { x1: X(v), y1: top, x2: X(v), y2: bottom, class: 'grid' }),
            node('line', { x1: left, y1: Y(v), x2: right, y2: Y(v), class: 'grid' }),
            node('text', {
              x: X(v), y: bottom + 14,
              'font-size': 10, 'text-anchor': 'middle', class: 'svg-muted'
            }, v.toString()),
            node('text', {
              x: left - 6, y: Y(v) + 3,
              'font-size': 10, 'text-anchor': 'end', class: 'svg-muted'
            }, v.toString())
          );
        });

        // Axes.
        rocPlot.append(
          node('line', { x1: left, y1: bottom, x2: right, y2: bottom, class: 'axis' }),
          node('line', { x1: left, y1: bottom, x2: left, y2: top, class: 'axis' }),
          node('text', {
            x: (left + right) / 2, y: bottom + 32,
            'font-size': 11, 'text-anchor': 'middle', class: 'svg-muted'
          }, 'FPR'),
          node('text', {
            x: 16, y: (top + bottom) / 2,
            'font-size': 11, 'text-anchor': 'middle', class: 'svg-muted',
            transform: `rotate(-90 16 ${(top + bottom) / 2})`
          }, 'TPR')
        );

        // Faint rectangles for every negative (light context).
        negativeIndices.forEach(negIdx => {
          const rank = negativeRank.get(negIdx);
          const h = heightAt.get(negIdx);
          if (h <= 0) return;
          const x1 = X(rank / totalN);
          const x2 = X((rank + 1) / totalN);
          const y1 = Y(h);
          const y2 = Y(0);
          rocPlot.append(node('rect', {
            x: x1, y: y1, width: x2 - x1, height: y2 - y1,
            fill: 'var(--accent-soft)',
            stroke: 'var(--accent)',
            'stroke-width': .7,
            opacity: negIdx === selectedIndex ? 0 : 0.45
          }));
        });

        // Selected negative's rectangle — highlighted.
        const selRank = negativeRank.get(selectedIndex);
        const selH = heightAt.get(selectedIndex) || 0;
        if (selRank !== undefined) {
          const x1 = X(selRank / totalN);
          const x2 = X((selRank + 1) / totalN);
          const y1 = Y(selH);
          const y2 = Y(0);
          rocPlot.append(node('rect', {
            x: x1, y: y1, width: x2 - x1, height: y2 - y1,
            class: 'area-strip'
          }));

          // T(x_-) height annotation on the left edge of the rectangle.
          rocPlot.append(node('line', {
            x1: x1 - 6, y1: Y(selH),
            x2: x1 - 6, y2: Y(0),
            stroke: 'var(--accent)', 'stroke-width': 1.2
          }));
          rocPlot.append(node('text', {
            x: x1 - 10, y: (Y(selH) + Y(0)) / 2 + 3,
            'font-size': 11, 'text-anchor': 'end',
            class: 'svg-accent'
          }, `T(x\u208B) = ${formatFraction(selH * totalP, totalP)}`));

          // Width annotation on the bottom edge.
          rocPlot.append(node('text', {
            x: (x1 + x2) / 2, y: Y(0) + 12,
            'font-size': 10, 'text-anchor': 'middle',
            class: 'svg-accent'
          }, `1/|N|`));
        }

        // ROC staircase path.
        let d = `M ${X(rocPoints[0].fpr)} ${Y(rocPoints[0].tpr)}`;
        for (let i = 1; i < rocPoints.length; i += 1) {
          d += ` L ${X(rocPoints[i].fpr)} ${Y(rocPoints[i].tpr)}`;
        }
        rocPlot.append(node('path', { d, class: 'roc-path' }));

        // Diagonal baseline.
        rocPlot.append(node('line', {
          x1: X(0), y1: Y(0),
          x2: X(1), y2: Y(1),
          stroke: 'var(--line-strong)',
          'stroke-width': 1,
          'stroke-dasharray': '4 6',
          opacity: 0.6
        }));
      }

      function formatFraction(num, den) {
        // Simple integer fraction like "2/5" (samples chosen so heights are always /|P|).
        return `${Math.round(num)}/${den}`;
      }

      function updateReadouts() {
        const negNumber = selectedIndex + 1;
        selectedValue.innerHTML = `x<sub>${negNumber}</sub> \u00b7 negative`;
        rankState.textContent = `S(x\u208B) = ${samples[selectedIndex].score.toFixed(2)}`;

        const h = heightAt.get(selectedIndex) || 0;
        const heightNum = Math.round(h * totalP);
        const areaNum = heightNum;

        rocState.innerHTML = `width 1/|N| = 1/${totalN}, height T = ${heightNum}/${totalP}`;
        stepMetric.innerHTML = `<span class="math">x<sub>${negNumber}</sub></span> with <span class="math">S(x<sub>\u2212</sub>) = ${samples[selectedIndex].score.toFixed(2)}</span>`;
        heightMetric.innerHTML = `<span class="math">T(x<sub>\u2212</sub>) = ${heightNum} / ${totalP}</span>`;
        areaMetric.innerHTML = `<span class="math">T(x<sub>\u2212</sub>) / |N| = ${areaNum} / ${totalP * totalN}</span>`;
      }

      function select(i) {
        if (samples[i].kind !== 'N') return;
        selectedIndex = i;
        renderRank();
        renderRoc();
        updateReadouts();
      }

      resetButton.addEventListener('click', () => {
        const currentRankPos = negativeIndices.indexOf(selectedIndex);
        const next = negativeIndices[(currentRankPos + 1) % negativeIndices.length];
        select(next);
      });

      rankTab.addEventListener('click', () => {
        workspace.dataset.mobilePanel = 'rank';
        rankTab.classList.add('is-active');
        rankTab.setAttribute('aria-selected', 'true');
        rocTab.classList.remove('is-active');
        rocTab.setAttribute('aria-selected', 'false');
      });
      rocTab.addEventListener('click', () => {
        workspace.dataset.mobilePanel = 'roc';
        rocTab.classList.add('is-active');
        rocTab.setAttribute('aria-selected', 'true');
        rankTab.classList.remove('is-active');
        rankTab.setAttribute('aria-selected', 'false');
      });

      renderRank();
      renderRoc();
      updateReadouts();
    })();
  </script>
</body>
</html>
