<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Area of one tied ROC segment</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400..800&family=Lora:ital,wght@0,400..700;1,400..700&display=swap">

  <style>
    :root {
      --page: var(--viz-page, #f7f5f1);
      --panel: var(--viz-surface, #fffdfa);
      --panel-2: var(--viz-surface-muted, #f2eef4);
      --ink: var(--viz-ink, #20232b);
      --muted: var(--viz-muted, #68717e);
      --line: var(--viz-border, #d9d2dc);
      --line-strong: var(--viz-border-strong, #a89daa);
      --accent: var(--viz-accent, #6d3fa0);
      --accent-ink: var(--viz-accent-ink, #5b3188);
      --accent-soft: var(--viz-accent-soft, #f0e7f8);
      --shadow: 0 18px 44px rgba(42, 30, 50, .08);

      --serif: "Lora", Georgia, "Times New Roman", serif;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco,
        Consolas, monospace;
      --math: "Cambria Math", "STIX Two Math", "Times New Roman", serif;

      color-scheme: light;
    }

    :root[data-theme="dark"] {
      --page: var(--viz-page, #0d1411);
      --panel: var(--viz-surface, #111b17);
      --panel-2: var(--viz-surface-muted, #17231e);
      --ink: var(--viz-ink, #f4f0e7);
      --muted: var(--viz-muted, #b6c0b8);
      --line: var(--viz-border, #314139);
      --line-strong: var(--viz-border-strong, #66766e);
      --accent: var(--viz-accent, #d7a8f5);
      --accent-ink: var(--viz-accent-ink, #e3c3fa);
      --accent-soft: var(--viz-accent-soft, #34233e);
      --shadow: 0 18px 48px rgba(0, 0, 0, .28);

      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-width: 0;
      background: transparent;
      color: var(--ink);
    }

    body {
      padding: 1px;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    button,
    input {
      font: inherit;
    }

    .area-viz {
      width: 100%;
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .area-viz::before {
      content: "";
      display: block;
      height: 3px;
      background: var(--accent);
    }

    .viz-head {
      padding: 16px 18px 13px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow,
    .panel-kicker,
    .metric-label,
    .state-label {
      font-family: var(--mono);
      font-weight: 750;
      letter-spacing: .075em;
      text-transform: uppercase;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--accent-ink);
      font-size: .66rem;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(1.48rem, 3.2vw, 2.22rem);
      font-weight: 550;
      letter-spacing: -0.035em;
      line-height: 1.16;
    }

    .lede {
      max-width: 740px;
      margin: 5px 0 0;
      color: var(--muted);
      font-family: var(--serif);
      font-size: .9rem;
      line-height: 1.43;
    }

    .threshold-control {
      display: grid;
      grid-template-columns:
        minmax(0, 1fr)
        minmax(150px, 280px)
        minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 11px 18px 12px;
      border-bottom: 1px solid var(--line);
      background:
        color-mix(in srgb, var(--panel-2) 70%, var(--panel));
    }

    .state-button {
      appearance: none;
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .state-button:first-child {
      text-align: right;
    }

    .state-button:last-child {
      text-align: left;
    }

    .state-button[aria-pressed="true"] {
      color: var(--accent-ink);
    }

    .state-label {
      display: block;
      font-size: .62rem;
    }

    .state-copy {
      display: block;
      margin-top: 2px;
      font-family: var(--math);
      font-size: .86rem;
    }

    #thresholdToggle {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    #thresholdToggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }

    .mobile-tabs {
      display: none;
      gap: 6px;
      padding: 10px 10px 0;
    }

    .mobile-tab {
      appearance: none;
      flex: 1 1 0;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: .65rem;
      font-weight: 750;
      letter-spacing: .045em;
      text-transform: uppercase;
    }

    .mobile-tab.is-active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-ink);
    }

    .workspace {
      display: grid;
      grid-template-columns:
        minmax(0, .9fr)
        minmax(0, 1.1fr);
      gap: 12px;
      padding: 12px;
    }

    .panel {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--line);
    }

    .panel-kicker {
      color: var(--accent-ink);
      font-size: .62rem;
    }

    .panel-title {
      margin: 2px 0 0;
      font-family: var(--serif);
      font-size: .98rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .panel-state {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .62rem;
      text-align: right;
    }

    .plot-wrap {
      min-width: 0;
      padding: 6px 8px 8px;
      background:
        linear-gradient(
          var(--line) 1px,
          transparent 1px
        ) 0 0 / 100% 38px,
        color-mix(
          in srgb,
          var(--panel-2) 54%,
          var(--panel)
        );
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    #scorePlot {
      aspect-ratio: 430 / 250;
    }

    #areaPlot {
      aspect-ratio: 520 / 250;
    }

    svg text {
      fill: var(--ink);
      font-family: var(--sans);
    }

    .svg-muted {
      fill: var(--muted);
    }

    .svg-accent {
      fill: var(--accent-ink);
    }

    .axis {
      stroke: var(--line-strong);
      stroke-width: 1.4;
    }

    .grid {
      stroke: var(--line);
      stroke-width: 1;
    }

    .guide {
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 6 5;
    }

    .segment {
      stroke: var(--accent);
      stroke-width: 5;
      stroke-linecap: round;
    }

    .rectangle {
      fill:
        color-mix(
          in srgb,
          var(--accent-soft) 88%,
          transparent
        );
    }

    .triangle {
      fill:
        color-mix(
          in srgb,
          var(--accent) 22%,
          transparent
        );
    }

    .outline {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.4;
    }

    .sample-p {
      fill: var(--accent);
    }

    .sample-n {
      fill: var(--muted);
    }

    .sample-ring {
      fill: var(--panel);
      stroke: var(--line);
      stroke-width: 2;
    }

    .sample-text {
      fill: var(--panel);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 800;
    }

    .symbol-definitions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-top: 1px solid var(--line);
      background:
        color-mix(
          in srgb,
          var(--accent-soft) 42%,
          var(--panel)
        );
    }

    .symbol-definition {
      min-width: 0;
      padding: 10px 13px 11px;
    }

    .symbol-definition + .symbol-definition {
      border-left: 1px solid var(--line);
    }

    .symbol-name {
      color: var(--accent-ink);
      font-family: var(--math);
      font-size: .96rem;
      font-weight: 700;
    }

    .symbol-copy {
      margin-top: 2px;
      color: var(--muted);
      font-family: var(--serif);
      font-size: .82rem;
      line-height: 1.35;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: 1px solid var(--line);
      background: var(--panel-2);
    }

    .metric {
      min-width: 0;
      padding: 11px 13px 12px;
    }

    .metric + .metric {
      border-left: 1px solid var(--line);
    }

    .metric-label {
      color: var(--muted);
      font-size: .59rem;
    }

    .metric-value {
      margin-top: 4px;
      color: var(--ink);
      font-family: var(--math);
      font-size: clamp(.82rem, 2vw, .98rem);
      line-height: 1.38;
    }

    .metric-explanation {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-family: var(--serif);
      font-size: .76rem;
      line-height: 1.3;
    }

    .math {
      color: var(--accent-ink);
      font-family: var(--math);
    }

    figcaption {
      margin: 0;
      padding: 11px 14px 13px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: var(--serif);
      font-size: .84rem;
      line-height: 1.45;
    }

    figcaption strong {
      color: var(--ink);
    }

    @media (max-width: 690px) {
      .mobile-tabs {
        display: flex;
      }

      .workspace {
        grid-template-columns: 1fr;
        padding-top: 8px;
      }

      .workspace[data-mobile-panel="score"] #areaPanel,
      .workspace[data-mobile-panel="area"] #scorePanel {
        display: none;
      }

      #scorePlot {
        width: min(100%, 520px);
        margin-inline: auto;
        aspect-ratio: 430 / 230;
      }

      #areaPlot {
        width: min(100%, 560px);
        margin-inline: auto;
      }
    }

    @media (max-width: 520px) {
      .area-viz {
        border-radius: 16px;
      }

      .viz-head {
        padding: 14px 14px 12px;
      }

      .lede {
        font-size: .84rem;
      }

      .threshold-control {
        grid-template-columns: 1fr 1fr;
        gap: 8px 12px;
        padding: 10px 14px 12px;
      }

      #thresholdToggle {
        grid-column: 1 / -1;
        grid-row: 2;
      }

      .state-button:first-child {
        text-align: left;
      }

      .state-button:last-child {
        text-align: right;
      }

      .workspace {
        gap: 10px;
        padding: 10px;
      }

      .panel-head {
        align-items: flex-start;
      }

      .panel-state {
        max-width: 120px;
      }

      .symbol-definitions {
        grid-template-columns: 1fr;
      }

      .symbol-definition + .symbol-definition {
        border-top: 1px solid var(--line);
        border-left: 0;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .metric + .metric {
        border-top: 1px solid var(--line);
        border-left: 0;
      }

      .metric {
        padding: 9px 11px 10px;
      }

      .metric-label {
        font-size: .55rem;
      }

      .metric-value {
        font-size: .82rem;
        line-height: 1.3;
      }

      figcaption {
        font-size: .8rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <figure
    class="area-viz"
    id="areaFigure"
    aria-labelledby="areaTitle areaDescription"
  >
    <header class="viz-head">
      <p class="eyebrow">AUC as area</p>

      <h1 id="areaTitle">
        One tied score creates one diagonal ROC segment
      </h1>

      <p class="lede" id="areaDescription">
        Toggle the threshold across the shared score
        <span class="math">s</span>. When the threshold drops past
        <span class="math">s</span> from above, the tied samples all
        join the predicted-positive set together. If the tie
        contains <span class="math">a</span> positives and
        <span class="math">b</span> negatives, TPR grows by
        <span class="math">a/|P|</span> and FPR grows by
        <span class="math">b/|N|</span>.
      </p>
    </header>

    <div class="threshold-control">
      <button
        class="state-button"
        id="belowButton"
        type="button"
        aria-pressed="true"
      >
        <span class="state-label">t below s</span>
        <span class="state-copy">tied samples predicted positive</span>
      </button>

      <input
        id="thresholdToggle"
        type="range"
        min="0"
        max="1"
        step="1"
        value="0"
        aria-label="Move the threshold from below the tied score to above it"
      >

      <button
        class="state-button"
        id="aboveButton"
        type="button"
        aria-pressed="false"
      >
        <span class="state-label">t above s</span>
        <span class="state-copy">tied samples predicted negative</span>
      </button>
    </div>

    <div
      class="mobile-tabs"
      role="tablist"
      aria-label="Choose the coordinate view"
    >
      <button
        type="button"
        class="mobile-tab is-active"
        id="scoreTab"
        role="tab"
        aria-selected="true"
        aria-controls="scorePanel"
      >
        score ordering
      </button>

      <button
        type="button"
        class="mobile-tab"
        id="areaTab"
        role="tab"
        aria-selected="false"
        aria-controls="areaPanel"
      >
        ROC space
      </button>
    </div>

    <div
      class="workspace"
      id="workspace"
      data-mobile-panel="score"
    >
      <section
        class="panel"
        id="scorePanel"
        aria-labelledby="scorePanelTitle"
      >
        <div class="panel-head">
          <div>
            <div class="panel-kicker">score ordering</div>

            <h2 class="panel-title" id="scorePanelTitle">
              The tie group crosses as one block
            </h2>
          </div>

          <div class="panel-state" id="scoreState">
            t below s
          </div>
        </div>

        <div class="plot-wrap">
          <svg
            id="scorePlot"
            viewBox="0 0 430 250"
            role="img"
            aria-label="A threshold moving across tied samples on a score axis that increases from left to right"
          ></svg>
        </div>
      </section>

      <section
        class="panel"
        id="areaPanel"
        aria-labelledby="areaPanelTitle"
      >
        <div class="panel-head">
          <div>
            <div class="panel-kicker">ROC space</div>

            <h2 class="panel-title" id="areaPanelTitle">
              The trapezoid is rectangle plus triangle
            </h2>
          </div>

          <div class="panel-state" id="areaState">
            at (F<sub>k+1</sub>, T<sub>k+1</sub>)
          </div>
        </div>

        <div class="plot-wrap">
          <svg
            id="areaPlot"
            viewBox="0 0 520 250"
            role="img"
            aria-label="A diagonal ROC segment and its rectangle and triangle area decomposition"
          ></svg>
        </div>
      </section>
    </div>

    <div
      class="symbol-definitions"
      aria-label="Definitions of a and b"
    >
      <div class="symbol-definition">
        <div class="symbol-name">
          a = number of positives tied at score s
        </div>

        <div class="symbol-copy">
          Here the tied block contains two positives, so
          <span class="math">a = 2</span>.
        </div>
      </div>

      <div class="symbol-definition">
        <div class="symbol-name">
          b = number of negatives tied at score s
        </div>

        <div class="symbol-copy">
          Here the tied block contains one negative, so
          <span class="math">b = 1</span>.
        </div>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">
          ΔFPR when the tie group enters
        </div>

        <div class="metric-value">
          <span class="math">b/|N| = 1/|N|</span>

          <span class="metric-explanation">
            one tied negative divided by all negatives
          </span>
        </div>
      </div>

      <div class="metric">
        <div class="metric-label">
          ΔTPR when the tie group enters
        </div>

        <div class="metric-value">
          <span class="math">a/|P| = 2/|P|</span>

          <span class="metric-explanation">
            two tied positives divided by all positives
          </span>
        </div>
      </div>

      <div class="metric">
        <div class="metric-label">segment area</div>

        <div class="metric-value">
          <span class="math">
            ΔFPR ·
            (T<sub>k</sub> + T<sub>k+1</sub>)/2
          </span>
        </div>
      </div>
    </div>

    <figcaption>
      <strong>Rectangle from the tied negative, triangle from the tied positives.</strong>
      Read the segment as a superposition. A crossed negative moves the walk right by <span class="math">1/|N|</span> — on its own it would leave a rectangle of area <span class="math">1/|N| · T<sub>k</sub></span>. A crossed positive moves it up by <span class="math">1/|P|</span> — on its own it adds no area (zero width). The two happen at the same score here, so the walk steps diagonally and the region under the segment is the sum: the rectangle underneath, plus a triangle of area <span class="math">½ · ΔFPR · ΔTPR</span> resting on it.
    </figcaption>
  </figure>

  <script>
    (() => {
      "use strict";

      const figure =
        document.getElementById("areaFigure");

      const toggle =
        document.getElementById("thresholdToggle");

      const aboveButton =
        document.getElementById("aboveButton");

      const belowButton =
        document.getElementById("belowButton");

      const scoreState =
        document.getElementById("scoreState");

      const areaState =
        document.getElementById("areaState");

      const scorePlot =
        document.getElementById("scorePlot");

      const areaPlot =
        document.getElementById("areaPlot");

      const workspace =
        document.getElementById("workspace");

      const scoreTab =
        document.getElementById("scoreTab");

      const areaTab =
        document.getElementById("areaTab");

      const NS =
        "http://www.w3.org/2000/svg";

      const reducedMotion =
        window.matchMedia(
          "(prefers-reduced-motion: reduce)"
        );

      let displayedState = 0;
      let targetState = 0;
      let animationFrame = 0;

      function node(name, attrs = {}, text = "") {
        const element =
          document.createElementNS(NS, name);

        Object.entries(attrs).forEach(
          ([key, value]) => {
            element.setAttribute(
              key,
              String(value)
            );
          }
        );

        if (text) {
          element.textContent = text;
        }

        return element;
      }

      function clear(svg) {
        while (svg.firstChild) {
          svg.removeChild(svg.firstChild);
        }
      }

      function clamp(value, low, high) {
        return Math.min(
          high,
          Math.max(low, value)
        );
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeInOutCubic(t) {
        return t < .5
          ? 4 * t * t * t
          : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function renderScore(progress) {
        clear(scorePlot);

        const axisY = 128;

        /*
         * Scores increase from left to right.
         *
         * progress = 0: threshold sits to the left of s, so t < s
         * and all tied samples are predicted positive.
         *
         * progress = 1: threshold sits to the right of s, so t > s
         * and all tied samples are predicted negative.
         */
        const thresholdX =
          lerp(146, 326, progress);

        const after =
          progress >= .5;

        scorePlot.append(
          node("line", {
            x1: 48,
            y1: axisY,
            x2: 382,
            y2: axisY,
            class: "axis"
          }),

          node("line", {
            x1: thresholdX,
            y1: 42,
            x2: thresholdX,
            y2: 207,
            class: "guide"
          }),

          node("text", {
            x: 48,
            y: 28,
            "font-size": 12,
            class: "svg-accent"
          }, "lower score"),

          node("text", {
            x: 382,
            y: 28,
            "font-size": 12,
            "text-anchor": "end",
            class: "svg-accent"
          }, "higher score"),

          node("text", {
            x: thresholdX,
            y: 224,
            "font-size": 11,
            "text-anchor": "middle",
            class: "svg-muted"
          }, after
            ? "threshold above s"
            : "threshold below s"
          )
        );

        const tieX = [194, 236, 278];
        const kinds = ["N", "P", "P"];

        /*
         * At progress = 0 the tied samples are predicted positive
         * and shown at full strength; at progress = 1 they are
         * predicted negative and fade.
         */
        const opacity =
          1 - .70 * progress;

        const scale =
          1 - .04 * progress;

        const group = node("g", {
          style:
            `opacity:${opacity};` +
            `transform:scale(${scale});` +
            "transform-box:fill-box;" +
            "transform-origin:center;"
        });

        tieX.forEach((x, index) => {
          group.append(
            node("circle", {
              cx: x,
              cy: axisY,
              r: 17,
              class: "sample-ring"
            }),

            node("circle", {
              cx: x,
              cy: axisY,
              r: 14,
              class:
                kinds[index] === "P"
                  ? "sample-p"
                  : "sample-n"
            }),

            node("text", {
              x,
              y: axisY + 4,
              "text-anchor": "middle",
              class: "sample-text"
            }, kinds[index])
          );
        });

        scorePlot.append(group);

        scorePlot.append(
          node("path", {
            d: "M 188 90 Q 236 68 284 90",
            fill: "none",
            stroke: "var(--accent)",
            "stroke-width": 1.5
          }),

          node("text", {
            x: 236,
            y: 61,
            "font-size": 12,
            "text-anchor": "middle",
            class: "svg-accent"
          }, "same score s"),

          node("text", {
            x: 215,
            y: 163,
            "font-size": 11,
            "text-anchor": "middle",
            class: "svg-accent"
          }, "a = 2 positives"),

          node("text", {
            x: 278,
            y: 184,
            "font-size": 11,
            "text-anchor": "middle",
            class: "svg-accent"
          }, "b = 1 negative"),

          node("text", {
            x: 236,
            y: 205,
            "font-size": 11,
            "text-anchor": "middle",
            class: "svg-muted"
          }, after
            ? "none of the tied samples is included"
            : "all three are predicted positive"
          )
        );
      }

      function renderArea(progress) {
        clear(areaPlot);

        const left = 55;
        const right = 482;
        const top = 22;
        const bottom = 211;

        const X = value =>
          left + value * (right - left);

        const Y = value =>
          bottom - value * (bottom - top);

        const F0 = .22;
        const F1 = .68;
        const T0 = .27;
        const T1 = .74;

        [0, .25, .5, .75, 1].forEach(
          value => {
            areaPlot.append(
              node("line", {
                x1: X(value),
                y1: top,
                x2: X(value),
                y2: bottom,
                class: "grid"
              }),

              node("line", {
                x1: left,
                y1: Y(value),
                x2: right,
                y2: Y(value),
                class: "grid"
              })
            );
          }
        );

        areaPlot.append(
          node("line", {
            x1: left,
            y1: bottom,
            x2: right,
            y2: bottom,
            class: "axis"
          }),

          node("line", {
            x1: left,
            y1: bottom,
            x2: left,
            y2: top,
            class: "axis"
          }),

          node("polygon", {
            points:
              `${X(F0)},${Y(T0)} ` +
              `${X(F1)},${Y(T0)} ` +
              `${X(F1)},${bottom} ` +
              `${X(F0)},${bottom}`,
            class: "rectangle"
          }),

          node("polygon", {
            points:
              `${X(F0)},${Y(T0)} ` +
              `${X(F1)},${Y(T1)} ` +
              `${X(F1)},${Y(T0)}`,
            class: "triangle"
          }),

          node("polyline", {
            points:
              `${X(F0)},${Y(T0)} ` +
              `${X(F1)},${Y(T1)} ` +
              `${X(F1)},${bottom} ` +
              `${X(F0)},${bottom} ` +
              `${X(F0)},${Y(T0)}`,
            class: "outline"
          }),

          node("line", {
            x1: X(F0),
            y1: Y(T0),
            x2: X(F1),
            y2: Y(T1),
            class: "segment"
          }),

          node("text", {
            x: (X(F0) + X(F1)) / 2,
            y: Y(T0) + 20,
            "font-size": 11,
            "text-anchor": "middle",
            class: "svg-accent"
          }, "rectangle from tied N"),

          node("text", {
            x: (X(F0) + X(F1)) / 2,
            y: Y(T0) + 35,
            "font-size": 10,
            "text-anchor": "middle",
            class: "svg-muted"
          }, "1/|N| · Tₖ"),

          node("text", {
            x: X(F1) - 62,
            y: (Y(T0) + Y(T1)) / 2 - 5,
            "font-size": 11,
            "text-anchor": "middle",
            class: "svg-accent"
          }, "triangle from tied P"),

          node("text", {
            x: X(F1) - 62,
            y: (Y(T0) + Y(T1)) / 2 + 10,
            "font-size": 10,
            "text-anchor": "middle",
            class: "svg-muted"
          }, "½ · ΔFPR · ΔTPR"),

          node("text", {
            x: (left + right) / 2,
            y: 241,
            "font-size": 12,
            "text-anchor": "middle",
            class: "svg-muted"
          }, "false-positive rate"),

          node("text", {
            x: 15,
            y: (top + bottom) / 2,
            "font-size": 12,
            "text-anchor": "middle",
            class: "svg-muted",
            transform:
              `rotate(-90 15 ${(top + bottom) / 2})`
          }, "true-positive rate")
        );

        /*
         * Progress 0 = "t below s": all tied samples are in the
         * predicted-positive set, so the ROC point is at the
         * upper-right endpoint (F_{k+1}, T_{k+1}).
         *
         * Progress 1 = "t above s": tied samples are not (yet)
         * in the predicted-positive set, so the ROC point sits
         * at the lower-left endpoint (F_k, T_k).
         */
        const markerX =
          lerp(X(F1), X(F0), progress);

        const markerY =
          lerp(Y(T1), Y(T0), progress);

        const after =
          progress >= .5;

        areaPlot.append(
          node("circle", {
            cx: X(F0),
            cy: Y(T0),
            r: 5,
            fill: "var(--line-strong)",
            stroke: "var(--panel)",
            "stroke-width": 3
          }),

          node("circle", {
            cx: X(F1),
            cy: Y(T1),
            r: 5,
            fill: "var(--line-strong)",
            stroke: "var(--panel)",
            "stroke-width": 3
          }),

          node("circle", {
            cx: markerX,
            cy: markerY,
            r: 8,
            fill: "var(--accent)",
            stroke: "var(--panel)",
            "stroke-width": 3
          }),

          node("text", {
            x: X(F0) - 8,
            y: Y(T0) + 4,
            "font-size": 11,
            "text-anchor": "end",
            "font-weight": after ? 700 : 400,
            class: "svg-accent"
          }, "(Fₖ, Tₖ)"),

          node("text", {
            x: X(F1) + 8,
            y: Y(T1) + 4,
            "font-size": 11,
            "text-anchor": "start",
            "font-weight": after ? 400 : 700,
            class: "svg-accent"
          }, "(Fₖ₊₁, Tₖ₊₁)"),

          node("line", {
            x1: X(F0),
            y1: bottom + 5,
            x2: X(F1),
            y2: bottom + 5,
            stroke: "var(--accent)",
            "stroke-width": 1.4
          }),

          node("text", {
            x: (X(F0) + X(F1)) / 2,
            y: bottom + 20,
            "font-size": 11,
            "text-anchor": "middle",
            class: "svg-accent"
          }, "ΔFPR = b/|N|")
        );
      }

      function setTextForState(state) {
        const after =
          state === 1;

        belowButton.setAttribute(
          "aria-pressed",
          String(!after)
        );

        aboveButton.setAttribute(
          "aria-pressed",
          String(after)
        );

        scoreState.textContent =
          after
            ? "t above s"
            : "t below s";

        areaState.textContent =
          after
            ? "at (F\u2096, T\u2096)"
            : "at (F\u2096\u208A\u2081, T\u2096\u208A\u2081)";

        figure.dataset.thresholdState =
          after ? "above" : "below";
      }

      function render(progress) {
        renderScore(progress);
        renderArea(progress);
      }

      function animateTo(
        state,
        immediate = false
      ) {
        state = clamp(
          Math.round(Number(state)),
          0,
          1
        );

        targetState = state;
        toggle.value = String(state);

        setTextForState(state);

        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
        }

        const start =
          displayedState;

        const delta =
          state - start;

        if (
          immediate ||
          reducedMotion.matches ||
          Math.abs(delta) < 1e-6
        ) {
          displayedState = state;
          render(displayedState);
          reportHeight();
          return;
        }

        let startTime = 0;
        const duration = 430;

        function frame(time) {
          if (!startTime) {
            startTime = time;
          }

          const fraction = clamp(
            (time - startTime) / duration,
            0,
            1
          );

          displayedState = lerp(
            start,
            state,
            easeInOutCubic(fraction)
          );

          render(displayedState);

          if (fraction < 1) {
            animationFrame =
              requestAnimationFrame(frame);
          } else {
            animationFrame = 0;
            displayedState = state;
            render(displayedState);
            reportHeight();
          }
        }

        animationFrame =
          requestAnimationFrame(frame);
      }

      let heightFrame = 0;

      function reportHeight() {
        if (heightFrame) {
          cancelAnimationFrame(heightFrame);
        }

        heightFrame =
          requestAnimationFrame(() => {
            heightFrame =
              requestAnimationFrame(() => {
                heightFrame = 0;

                const rect =
                  figure.getBoundingClientRect();

                const height =
                  Math.ceil(
                    rect.bottom +
                    window.scrollY +
                    2
                  );

                try {
                  if (window.frameElement) {
                    window.frameElement.style.minHeight =
                      "0px";

                    window.frameElement.style.height =
                      `${height}px`;
                  }
                } catch (_) {
                  // The iframe may be cross-origin.
                }

                if (window.parent !== window) {
                  window.parent.postMessage(
                    {
                      type:
                        "article-visualization-resize",
                      height
                    },
                    "*"
                  );
                }
              });
          });
      }

      function setMobilePanel(panel) {
        workspace.dataset.mobilePanel =
          panel;

        const scoreActive =
          panel === "score";

        scoreTab.classList.toggle(
          "is-active",
          scoreActive
        );

        areaTab.classList.toggle(
          "is-active",
          !scoreActive
        );

        scoreTab.setAttribute(
          "aria-selected",
          String(scoreActive)
        );

        areaTab.setAttribute(
          "aria-selected",
          String(!scoreActive)
        );

        reportHeight();
      }

      scoreTab.addEventListener(
        "click",
        () => setMobilePanel("score")
      );

      areaTab.addEventListener(
        "click",
        () => setMobilePanel("area")
      );

      toggle.addEventListener(
        "input",
        () => animateTo(toggle.value)
      );

      belowButton.addEventListener(
        "click",
        () => animateTo(0)
      );

      aboveButton.addEventListener(
        "click",
        () => animateTo(1)
      );

      window.addEventListener(
        "resize",
        reportHeight,
        { passive: true }
      );

      window.addEventListener(
        "load",
        reportHeight,
        { once: true }
      );

      if ("ResizeObserver" in window) {
        new ResizeObserver(
          reportHeight
        ).observe(figure);
      }

      try {
        const parentTheme =
          window.parent.document
            .documentElement
            .dataset
            .theme;

        if (parentTheme) {
          document.documentElement
            .dataset
            .theme = parentTheme;
        }
      } catch (_) {
        // Parent theme is unavailable across origins.
      }

      animateTo(0, true);
    })();
  </script>
</body>
</html>
