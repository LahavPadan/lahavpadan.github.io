title: "Lahav's Blog"
description: "My learning notes on things I wanted to understand better."
url: "https://lahavpadan.github.io"
baseurl: ""
lang: en

profile_image: "/assets/images/whoami/me.jpg"
logo: "/assets/images/favicon.svg"

author:
  name: Lahav Padan
  url: "https://lahavpadan.github.io/whoami/"

social:
  name: Lahav Padan
  links:
    - "https://github.com/LahavPadan"

google_site_verification: "WyIFwUQImflujTpThYRQEFPBTXoOeQIx2G_n1OypzWE"

markdown: kramdown
kramdown:
  input: Kramdown
  # Defined in _plugins/math_block_engine.rb. Identical to kramdown's stock
  # `mathjax` engine except that a block equation is wrapped in
  # `div.math-block` instead of being emitted as a bare text node.
  math_engine: mathjax_block
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - templates
  - Gemfile
  - Gemfile.lock
  - README.md
  - README-FIRST.md
  - TECHNICAL-NOTES.md
  - SEARCH-CONSOLE-AFTER-DEPLOY.md
  - REDUNDANT-FILES-REMOVED.txt
  - scripts
  - package.json
  - package-lock.json
  - node_modules
  - vendor
  - .github
  # Backup/scratch files: any *.before-* or *.bak leftover shouldn't
  # end up in _site. Jekyll processes files with YAML front matter
  # regardless of extension, so if a `posts/foo/index.md.before-…`
  # exists it will otherwise be treated as a page and clone the post.
  # Google Search Console has been rejecting the sitemap because
  # these backup URLs are unreachable or double-listed alongside the
  # real post. Keep this list tight: patterns not extensions.
  - "**/*.before-*"
  - "**/*.bak"
  - "**/*.orig"
  - "**/*~"
