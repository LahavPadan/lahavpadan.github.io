<header class="site-header">
  <div class="shell header-inner">
    <a class="site-mark" href="{{ '/' | relative_url }}" aria-label="lahavpadan.github.io home">lahavpadan.github.io</a>

    <nav class="site-nav" aria-label="Primary navigation">
      <a {% if page.url == '/' %}aria-current="page"{% endif %} href="{{ '/' | relative_url }}">posts</a>
      <a {% if page.url == '/whoami/' %}aria-current="page"{% endif %} href="{{ '/whoami/' | relative_url }}">whoami</a>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Use dark theme" aria-pressed="false">
        <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M20.6 15.1A8.5 8.5 0 0 1 8.9 3.4 8.5 8.5 0 1 0 20.6 15.1Z"></path>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
        <span class="sr-only" data-theme-text>Toggle colour theme</span>
      </button>
    </nav>
  </div>
</header>
