<header class="site-header">
  <div class="shell header-inner">
    <a class="site-mark" href="{{ '/' | relative_url }}" aria-label="lahavpadan.github.io home">~/lahavpadan.github.io/</a>

    <nav class="site-nav" aria-label="Primary navigation">
      <a {% if page.url == '/' %}aria-current="page"{% endif %} href="{{ '/' | relative_url }}">posts</a>
      <a {% if page.url == '/whoami/' %}aria-current="page"{% endif %} href="{{ '/whoami/' | relative_url }}">whoami</a>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch colour theme" aria-pressed="false">
        <span aria-hidden="true">◐</span>
        <span class="sr-only">Switch colour theme</span>
      </button>
    </nav>
  </div>
</header>
